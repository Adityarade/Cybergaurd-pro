name: CyberGuard CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    name: Lint & Pytest Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Code Quality Syntax Linting
      run: |
        # Check syntax errors or undefined names
        python -m pip install flake8
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Backend Pytest Verification
      run: |
        pytest backend/tests/ -v

  deploy-prod:
    name: Production Rolling Deployment
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Trigger Render Deploy Webhook
      run: |
        echo "Initiating automated deployment request to Render production hosting..."
        curl -X POST "${{ secrets.RENDER_DEPLOY_WEBHOOK_URL }}"
        echo "Deployment webhook successfully fired."
